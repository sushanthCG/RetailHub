<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RetailHub</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container">
    <h2>🔐 Welcome Back</h2>

    <!-- These show automatically based on ?reason= in URL -->
    <div class="session-alert expired"      id="alertExpired">⏰ Session expired. Please log in again.</div>
    <div class="session-alert unauthorized" id="alertUnauth">🚫 Unauthorized. Please log in to continue.</div>
    <div class="session-alert notfound"     id="alertNotFound">❓ Page not found. Redirected to login.</div>

    <form id="loginForm">
        <input type="email" name="email" placeholder="Email address" required>

        <div class="password-wrapper">
            <input type="password" name="password" id="loginPwd"
                   placeholder="Password" required>
            <button type="button" class="eye-btn"
                    onclick="toggleLoginEye(this)">👁</button>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="login-link">
        <a th:href="@{/api/register}">Create Account</a> &nbsp;|&nbsp;
        <a th:href="@{/auth/ForgetPassword}">Forgot Password?</a>
    </div>
</div>

<div id="popup" class="popup"></div>

<script th:src="@{/login.js}"></script>
<script>
    /* Show alert based on ?reason= URL param */
    const reason = new URLSearchParams(window.location.search).get('reason');
    if (reason === 'expired')      document.getElementById('alertExpired').style.display   = 'block';
    if (reason === 'unauthorized') document.getElementById('alertUnauth').style.display    = 'block';
    if (reason === 'notfound')     document.getElementById('alertNotFound').style.display  = 'block';

    /* Eye toggle for login password */
    function toggleLoginEye(btn) {
        const inp = document.getElementById('loginPwd');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
</script>
</body>
</html>
