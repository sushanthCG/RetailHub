<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products - RetailHub</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/products.css}">
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav class="navbar">
    <div class="brand">🛒 Retail<span>Hub</span></div>

    <!-- CENTER SEARCH -->
    <div class="search-bar">
        <select id="searchCatSelect">
            <option value="All">All Categories</option>
            <option value="Shirts">Shirts</option>
            <option value="Pants">Pants</option>
            <option value="Accessories">Accessories</option>
            <option value="Mobiles">Mobiles</option>
            <option value="Mobile Accessories">Mobile Accessories</option>
        </select>
        <input type="text" id="searchInput"
               placeholder="Search for products, brands and more...">
        <button onclick="doSearch()">🔍</button>
    </div>

    <!-- RIGHT -->
    <div class="nav-right">
        <button class="cart-btn" onclick="openCart()">
            🛍️
            <span class="cart-badge" id="cartBadge">0</span>
        </button>

        <div class="profile-wrap">
            <button class="profile-btn" onclick="toggleDrop()">
                👤 Account ▾
            </button>
            <div class="drop-menu" id="dropMenu">
                <a href="#">👤 &nbsp;My Profile</a>
            <a href="/api/my-orders">📦 &nbsp;My Orders</a>
                <a href="#">⚙️ &nbsp;Settings</a>
                <div class="divider"></div>
                <a href="/auth/logout" class="logout">🚪 &nbsp;Logout</a>
            </div>
        </div>

        <a href="/auth/logout" class="logout-btn">Logout</a>
    </div>
</nav>

<!-- ══ PAGE LAYOUT ══ -->
<div class="page-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-title">Categories</div>
        <!-- exact category_name values from DB -->
        <button class="cat-btn active" onclick="filterCat(this,'All')">🏠 All Products</button>
        <button class="cat-btn" onclick="filterCat(this,'Shirts')">👔 Shirts</button>
        <button class="cat-btn" onclick="filterCat(this,'Pants')">👖 Pants</button>
        <button class="cat-btn" onclick="filterCat(this,'Accessories')">👜 Accessories</button>
        <button class="cat-btn" onclick="filterCat(this,'Mobiles')">📱 Mobiles</button>
        <button class="cat-btn" onclick="filterCat(this,'Mobile Accessories')">🎧 Mobile Accessories</button>

        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Price Range</div>

        <div class="price-filter">
            <input type="radio" name="price" id="p0" value="0" checked onclick="filterPrice(0)">
            <label for="p0">All Prices</label>
        </div>
        <div class="price-filter">
            <input type="radio" name="price" id="p500" value="500" onclick="filterPrice(500)">
            <label for="p500">Under ₹500</label>
        </div>
        <div class="price-filter">
            <input type="radio" name="price" id="p1000" value="1000" onclick="filterPrice(1000)">
            <label for="p1000">Under ₹1,000</label>
        </div>
        <div class="price-filter">
            <input type="radio" name="price" id="p5000" value="5000" onclick="filterPrice(5000)">
            <label for="p5000">Under ₹5,000</label>
        </div>
        <div class="price-filter">
            <input type="radio" name="price" id="p20000" value="20000" onclick="filterPrice(20000)">
            <label for="p20000">Under ₹20,000</label>
        </div>
        <div class="price-filter">
            <input type="radio" name="price" id="p50000" value="50000" onclick="filterPrice(50000)">
            <label for="p50000">Under ₹50,000</label>
        </div>

    </aside>

    <!-- RIGHT CONTENT -->
    <main class="content">

        <!-- Results + Sort bar -->
        <div class="results-bar">
            <span id="resultsCount">Showing all products</span>
            <select id="sortSelect" onchange="sortProducts()">
                <option value="default">Sort: Relevance</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="name">Name: A to Z</option>
            </select>
        </div>

        <!-- No results message -->
        <div class="no-results" id="noResults" style="display:none">
            <div>🔍</div>
            <p>No products found. Try a different search or category.</p>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">

            <div class="product-card"
                 th:each="product : ${products}"
                 th:attr="data-category=${product.category != null ? product.category.category_name : ''},
                          data-price=${product.price},
                          data-name=${product.name}">

                <!-- IMAGE — field is image_url -->
                <div th:if="${product.images != null and !product.images.empty}">
                    <img th:src="${product.images[0].image_url}"
                         th:alt="${product.name}">
                </div>
                <div class="no-img"
                     th:if="${product.images == null or product.images.empty}">
                    🛍️
                </div>

                <div class="card-body">

                    <!-- CATEGORY — field is category_name -->
                    <div class="card-cat"
                         th:text="${product.category != null
                            ? product.category.category_name : 'General'}">
                    </div>

                    <!-- NAME — field is name -->
                    <div class="card-name" th:text="${product.name}">Name</div>

                    <!-- DESCRIPTION — field is description -->
                    <div class="card-desc" th:text="${product.description}">Desc</div>

                    <div class="card-footer">
                        <div>
                            <!-- PRICE — field is price -->
                            <div class="card-price">
                                ₹<span th:text="${product.price}"></span>
                            </div>
                            <!-- STOCK — field is stock -->
                            <div class="card-stock"
                                 th:classappend="${product.stock == 0} ? 'out' : ''"
                                 th:text="${product.stock > 0}
                                    ? 'In Stock (' + ${product.stock} + ')'
                                    : 'Out of Stock'">
                            </div>
                        </div>

                        <!-- ADD TO CART — ID is product_id -->
                        <button class="add-btn"
                                th:disabled="${product.stock == 0}"
                                th:attr="onclick='addToCart('
                                    + ${product.product_id}
                                    + ','
                                    + '&quot;' + ${product.name} + '&quot;'
                                    + ','
                                    + ${product.price}
                                    + ','
                                    + '&quot;' + (${product.images != null and !product.images.empty} ? ${product.images[0].image_url} : '') + '&quot;'
                                    + ')'">
                            🛒 Add to Cart
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- ══ CART OVERLAY ══ -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- ══ CART PANEL ══ -->
<div class="cart-panel" id="cartPanel">
    <div class="cart-head">
        <h3>🛍️ Your Cart</h3>
        <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
        <div class="cart-empty"><div>🛒</div>Your cart is empty</div>
    </div>
    <div class="cart-foot">
        <div class="cart-total-row">
            <span>Total</span>
            <span id="cartTotal">₹0</span>
        </div>
        <button class="checkout-btn">Proceed to Checkout →</button>
    </div>
</div>

<script th:src="@{/products.js}"></script>
</body>
</html>
