<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - RetailHub</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/orders.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">🛒 Retail<span>Hub</span></div>
    <div class="nav-right">
        <a href="/api/products-page" style="color:white;text-decoration:none">
            ← Continue Shopping
        </a>
        &nbsp;&nbsp;
        <a href="/auth/logout" style="color:white;text-decoration:none">
            🚪 Logout
        </a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-title">📦 My Orders</div>
    <div id="ordersContainer">Loading...</div>
</div>

<script>
fetch('/api/my-orders-data')
  .then(res => res.json())
  .then(orders => {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📦</div>
          <p>No orders yet.</p>
          <a href="/api/products-page">Shop Now →</a>
        </div>`;
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">${order.orderId}</div>
            <div class="order-date">Placed on: ${new Date(order.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
          <span class="status-badge status-${order.status}">${order.status}</span>
        </div>
        <div class="order-items">
          <div class="item-row" style="background:#f8f9ff;font-weight:600;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.5px;padding:10px 0;">
            <span class="item-name">Product</span>
            <span class="item-qty">Qty</span>
            <span class="item-price">Unit Price</span>
            <span class="item-total">Total</span>
          </div>
          ${order.items.map(item => `
            <div class="item-row">
              <span class="item-name">${item.productName}</span>
              <span class="item-qty">× ${item.qty}</span>
              <span class="item-price">₹${item.price}</span>
              <span class="item-total">₹${item.total}</span>
            </div>
          `).join('')}
        </div>
        <div class="order-footer">
          <div class="order-total"><span>Order Total:</span>₹${order.totalAmount}</div>
        </div>
      </div>
    `).join('');
  });
</script>
</body>
</html>
