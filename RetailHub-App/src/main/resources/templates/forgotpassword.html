<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <h2>🔑 Forgot Password</h2>

    <!-- STEP 1 — Email -->
    <div id="step1">
        <p style="text-align:center;color:#888;margin-bottom:16px;">
            Enter your registered email to receive an OTP
        </p>
        <input type="email" id="email" placeholder="Enter your registered email" required>
        <p id="errorMsg"   style="color:red;  display:none; margin-top:8px;"></p>
        <p id="successMsg" style="color:green;display:none; margin-top:8px;"></p>
        <button id="sendOtpBtn">Send OTP</button>
    </div>

    <!-- STEP 2 — OTP -->
    <div id="step2" style="display:none;">
        <p style="text-align:center;color:#888;margin-bottom:16px;">
            OTP sent to your email. Enter it below.
        </p>
        <input type="email" id="emailDisplay" disabled
               style="background:#f0f0f0;color:#888;">

        <!-- ✅ TIMER BOX — uses CSS class -->
        <div id="timerBox" class="timer-box" style="display:none;">
            <p id="timerText" style="margin:0;"></p>
        </div>

        <input type="text" id="otp" placeholder="Enter 6-digit OTP"
               maxlength="6" required>
        <p id="otpErrorMsg"   style="color:red;  display:none; margin-top:8px;"></p>
        <p id="otpSuccessMsg" style="color:green;display:none; margin-top:8px;"></p>
        <button id="submitOtpBtn">Submit OTP</button>
    </div>

    <div class="login-link">
       <a th:href="@{/auth/login}">← Back to Login</a>  <!-- ✅ -->
    </div>
</div>
<script th:src="@{/ForgetPassword.js}"></script>
</body>
</html>
